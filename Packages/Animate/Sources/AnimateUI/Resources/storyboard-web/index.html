<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Storyboard">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="application-name" content="Storyboard">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="color-scheme" content="dark">
  <title>Storyboard</title>
  <link rel="manifest" href="/static/manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="/static/icon-192.png">
  <link rel="icon" type="image/png" sizes="512x512" href="/static/icon-512.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <!-- Sidebar toggle (always visible when sidebar closed) -->
  <button id="sidebar-toggle-btn" class="icon-btn sidebar-toggle-outside" title="Show shots" aria-label="Show shots">
    <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect x="3" y="4" width="14" height="1.5" rx="0.75" fill="currentColor"/>
      <rect x="3" y="9.25" width="14" height="1.5" rx="0.75" fill="currentColor"/>
      <rect x="3" y="14.5" width="14" height="1.5" rx="0.75" fill="currentColor"/>
    </svg>
  </button>

  <!-- Left sidebar -->
  <aside id="sidebar" class="sidebar sidebar--open">
    <div class="sidebar-header">
      <span class="sidebar-title" id="project-name">Storyboard</span>
      <div class="sidebar-actions">
        <button id="add-item-btn" class="icon-btn icon-btn--accent" title="Add" aria-label="Add">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M10 4V16M4 10H16" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </button>
        <button id="sidebar-close-btn" class="icon-btn" title="Hide sidebar" aria-label="Hide sidebar">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M13 4L7 10L13 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="sidebar-tabs" role="tablist" aria-label="Storyboard sidebar mode">
      <button id="sidebar-tab-scenes" class="sidebar-tab sidebar-tab--active" role="tab" aria-selected="true" data-mode="scenes">Scenes</button>
      <button id="sidebar-tab-places" class="sidebar-tab" role="tab" aria-selected="false" data-mode="places">Places</button>
    </div>
    <div id="item-list" class="shot-list">
      <div class="shot-list-loading">Loading…</div>
    </div>
  </aside>

  <!-- Main content -->
  <main id="main" class="main main--sidebar-open">

    <!-- Top toolbar -->
    <header id="toolbar" class="toolbar toolbar--open">
      <div class="toolbar-inner">
        <div class="toolbar-center">
          <div class="tool-group">
            <button id="tool-pencil" class="icon-btn tool-btn tool-btn--active" title="Pencil" aria-label="Pencil" data-tool="pencil">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14.5 2.5L17.5 5.5L7.5 15.5L4 16L4.5 12.5L14.5 2.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M12 5L15 8" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </button>
            <button id="tool-eraser" class="icon-btn tool-btn" title="Eraser" aria-label="Eraser" data-tool="eraser">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M3 14L9 4L16 9L10 16H3V14Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/>
                <path d="M3 16H17" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
          <div class="tool-group tool-group--slider">
            <label class="slider-label" id="brush-label">Size</label>
            <button type="button" id="brush-decrement" class="size-step" title="Smaller brush" aria-label="Smaller brush">−</button>
            <input id="brush-slider" class="slider" type="range" min="1" max="12" value="6" aria-label="Brush size">
            <button type="button" id="brush-increment" class="size-step" title="Larger brush" aria-label="Larger brush">+</button>
            <span id="brush-value" class="slider-value">6</span>
          </div>
          <div class="tool-group">
            <button id="undo-btn" class="icon-btn" title="Undo (⌘Z)" aria-label="Undo">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M4 8H13C15.2 8 17 9.8 17 12C17 14.2 15.2 16 13 16H8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M7 5L4 8L7 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="redo-btn" class="icon-btn" title="Redo (⌘⇧Z)" aria-label="Redo">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M16 8H7C4.8 8 3 9.8 3 12C3 14.2 4.8 16 7 16H12" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M13 5L16 8L13 11" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <div class="tool-group">
            <button id="copy-btn" class="icon-btn" title="Copy frame" aria-label="Copy frame">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="6" y="3" width="11" height="13" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <path d="M13 16V17C13 17.55 12.55 18 12 18H4C3.45 18 3 17.55 3 17V7C3 6.45 3.45 6 4 6H5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
              </svg>
            </button>
            <button id="paste-btn" class="icon-btn" title="Paste frame" aria-label="Paste frame" disabled>
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <rect x="4" y="5" width="12" height="13" rx="1.5" stroke="currentColor" stroke-width="1.4"/>
                <rect x="7" y="2.5" width="6" height="3.5" rx="0.8" stroke="currentColor" stroke-width="1.4"/>
              </svg>
            </button>
            <button id="clear-btn" class="icon-btn" title="Clear canvas" aria-label="Clear canvas">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
            </button>
          </div>
        </div>
        <div class="toolbar-right">
          <div class="tool-group tool-group--nav">
            <button id="prev-btn" class="icon-btn" title="Previous frame (←)" aria-label="Previous frame">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 4L6 10L12 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
            <button id="next-btn" class="icon-btn" title="Next frame (→)" aria-label="Next frame">
              <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M8 4L14 10L8 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <button id="toolbar-toggle-btn" class="icon-btn toolbar-collapse-btn" title="Hide toolbar" aria-label="Hide toolbar">
            <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M4 14L10 8L16 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Toolbar show button (visible when toolbar collapsed) -->
    <button id="toolbar-show-btn" class="icon-btn toolbar-show-btn hidden" title="Show toolbar" aria-label="Show toolbar">
      <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M4 6L10 12L16 6" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </button>

    <!-- Canvas area -->
    <div id="canvas-area" class="canvas-area">
      <div id="app-status" class="app-status">Loading storyboard…</div>
      <div id="save-status" class="save-status" data-state="saved">Saved</div>
      <canvas id="drawing-canvas"></canvas>
    </div>

    <!-- Bottom bar -->
    <footer id="bottom-bar" class="bottom-bar">
      <div class="bottom-bar-inner">
        <textarea
          id="summary-editor"
          class="summary-editor"
          placeholder="Shot summary…"
          rows="1"
          aria-label="Shot summary"
        ></textarea>
        <div class="frame-picker" role="group" aria-label="Frame selector">
          <button class="frame-btn" data-frame="begin" aria-label="Begin frame">Begin</button>
          <button class="frame-btn frame-btn--active" data-frame="middle" aria-label="Middle frame">Middle</button>
          <button class="frame-btn" data-frame="end" aria-label="End frame">End</button>
        </div>
      </div>
    </footer>

  </main>

  <div id="add-shot-sheet" class="add-shot-sheet" role="dialog" aria-modal="true" aria-labelledby="add-shot-heading" aria-hidden="true" hidden>
    <form id="add-shot-form" class="add-shot-panel">
      <div class="add-shot-panel__header">
        <div id="add-shot-heading" class="add-shot-panel__title">Add shot</div>
        <button type="button" id="add-shot-close-btn" class="icon-btn" title="Cancel" aria-label="Cancel add shot">
          <svg viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 5L15 15M15 5L5 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </button>
      </div>
      <div class="add-shot-panel__scene" id="add-shot-scene-label">Selected scene</div>
      <div id="add-place-type-row" class="add-type-row" hidden>
        <button type="button" id="add-type-place" class="add-type-btn add-type-btn--active" data-add-type="place">Place</button>
        <button type="button" id="add-type-landmark" class="add-type-btn" data-add-type="landmark">Landmark</button>
      </div>
      <label class="add-shot-label" for="add-shot-title">Title</label>
      <input
        id="add-shot-title"
        class="add-shot-input"
        type="text"
        maxlength="120"
        placeholder="Shot N"
        autocomplete="off"
      >
      <div class="add-shot-panel__actions">
        <button type="button" id="add-shot-cancel-btn" class="secondary-btn">Cancel</button>
        <button type="submit" class="primary-btn">Add shot</button>
      </div>
    </form>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
