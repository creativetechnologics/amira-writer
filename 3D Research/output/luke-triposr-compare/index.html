<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Luke TripoSR Compare</title>
  <style>
    html, body { margin: 0; height: 100%; background: #101216; color: #f5f6f8; font-family: Inter, system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }
    .hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(16,18,22,.82); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 12px 14px;
      max-width: 440px; line-height: 1.35;
    }
    .hud h1 { margin: 0 0 8px; font-size: 15px; }
    .hud p { margin: 6px 0; font-size: 13px; color: #ccd1d8; }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 10px; flex-wrap: wrap; }
    button {
      background: #1c2230; color: #fff; border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
      padding: 8px 10px; cursor: pointer; font: inherit;
    }
    button.active { background: #2b4063; }
    .small { font-size: 12px; color: #aab1ba; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <h1>Luke — Local TripoSR Compare</h1>
    <p>Drag to orbit, scroll to zoom, right-drag to pan.</p>
    <p>These are two real local ML reconstructions from the Luke sheet: a <b>front-view</b> run and a <b>3/4-view</b> run. The 3/4 run is the better depth candidate.</p>
    <div class="row">
      <button id="threeQuarter" class="active">3/4 View Model</button>
      <button id="front">Front View Model</button>
    </div>
    <div class="row">
      <button id="toon" class="active">Toon</button>
      <button id="textured">Textured</button>
    </div>
    <p class="small" id="status">Loading 3/4-view model…</p>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const MODELS = {
      front: { obj: './front.obj', texture: './front-texture.png', label: 'front-view model' },
      threeQuarter: { obj: './three-quarter.obj', texture: './three-quarter-texture.png', label: '3/4-view model' }
    };

    const app = document.getElementById('app');
    const status = document.getElementById('status');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101216);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(1.1, 0.3, 2.0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    scene.add(new THREE.AmbientLight(0xffffff, 1.3));
    const key = new THREE.DirectionalLight(0xfff4d8, 2.0);
    key.position.set(1.6, 1.8, 1.4);
    scene.add(key);
    const fill = new THREE.DirectionalLight(0x8ab2ff, 0.8);
    fill.position.set(-1.4, 1.0, -1.0);
    scene.add(fill);
    const rim = new THREE.DirectionalLight(0xffffff, 0.5);
    rim.position.set(0.0, 1.5, -2.0);
    scene.add(rim);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(2.2, 64),
      new THREE.MeshBasicMaterial({ color: 0x1a1e25, transparent: true, opacity: 0.88 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.92;
    scene.add(ground);

    function createGradientMap() {
      const colors = [0x342c24, 0x8f7d62, 0xceb995, 0xf4e4c0];
      const size = colors.length;
      const data = new Uint8Array(size * 3);
      colors.forEach((hex, i) => {
        const c = new THREE.Color(hex);
        data[i * 3 + 0] = Math.round(c.r * 255);
        data[i * 3 + 1] = Math.round(c.g * 255);
        data[i * 3 + 2] = Math.round(c.b * 255);
      });
      const map = new THREE.DataTexture(data, size, 1, THREE.RGBFormat);
      map.minFilter = THREE.NearestFilter;
      map.magFilter = THREE.NearestFilter;
      map.needsUpdate = true;
      return map;
    }

    const gradientMap = createGradientMap();
    const textureLoader = new THREE.TextureLoader();
    const objLoader = new OBJLoader();

    let activeRoot = null;
    let activeMode = 'toon';
    let activeModel = 'threeQuarter';

    function applyMaterials(root, texture) {
      root.traverse((child) => {
        if (!child.isMesh) return;
        child.material = activeMode === 'toon'
          ? new THREE.MeshToonMaterial({ map: texture, gradientMap })
          : new THREE.MeshStandardMaterial({ map: texture, roughness: 0.96, metalness: 0.0 });
        if (!child.userData.edges) {
          const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(child.geometry, 28),
            new THREE.LineBasicMaterial({ color: 0x17161d })
          );
          child.userData.edges = edges;
          child.add(edges);
        }
        child.userData.edges.visible = activeMode === 'toon';
      });
    }

    function setButtonState() {
      document.getElementById('threeQuarter').classList.toggle('active', activeModel === 'threeQuarter');
      document.getElementById('front').classList.toggle('active', activeModel === 'front');
      document.getElementById('toon').classList.toggle('active', activeMode === 'toon');
      document.getElementById('textured').classList.toggle('active', activeMode === 'textured');
    }

    function frameObject(root) {
      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      controls.target.copy(center);
      camera.position.set(center.x + size.x * 1.0, center.y + size.y * 0.15, center.z + size.z * 2.0);
      controls.update();
      ground.position.y = box.min.y - 0.02;
    }

    function loadModel(keyName) {
      activeModel = keyName;
      setButtonState();
      status.textContent = `Loading ${MODELS[keyName].label}…`;
      if (activeRoot) scene.remove(activeRoot);

      textureLoader.load(MODELS[keyName].texture, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        objLoader.load(MODELS[keyName].obj, (root) => {
          activeRoot = root;
          root.rotation.y = Math.PI;
          applyMaterials(root, texture);
          scene.add(root);
          frameObject(root);
          status.textContent = `Showing ${MODELS[keyName].label}.`;
        });
      });
    }

    function refreshMode() {
      setButtonState();
      if (!activeRoot) return;
      textureLoader.load(MODELS[activeModel].texture, (texture) => {
        texture.colorSpace = THREE.SRGBColorSpace;
        applyMaterials(activeRoot, texture);
      });
    }

    document.getElementById('threeQuarter').addEventListener('click', () => loadModel('threeQuarter'));
    document.getElementById('front').addEventListener('click', () => loadModel('front'));
    document.getElementById('toon').addEventListener('click', () => { activeMode = 'toon'; refreshMode(); });
    document.getElementById('textured').addEventListener('click', () => { activeMode = 'textured'; refreshMode(); });

    loadModel('threeQuarter');

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
