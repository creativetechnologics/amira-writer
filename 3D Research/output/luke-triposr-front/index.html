<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Luke TripoSR Viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #101216; color: #f5f6f8; font-family: Inter, system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }
    .hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(16,18,22,.82); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 12px 14px;
      max-width: 420px; line-height: 1.35;
    }
    .hud h1 { margin: 0 0 8px; font-size: 15px; }
    .hud p { margin: 6px 0; font-size: 13px; color: #ccd1d8; }
    .hud .controls { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .hud button {
      background: #1c2230; color: #fff; border: 1px solid rgba(255,255,255,.12); border-radius: 10px;
      padding: 8px 10px; cursor: pointer; font: inherit;
    }
    .hud button.active { background: #2b4063; }
    .hud code { color: #fff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <h1>Luke — TripoSR Local Preview</h1>
    <p>Drag to orbit, scroll to zoom, right-drag to pan.</p>
    <p>Source: Luke reference-sheet crop → TripoSR local mesh → source texture → viewer toon shading.</p>
    <p><code>luke-triposr-front.obj</code></p>
    <div class="controls">
      <button id="toon" class="active">Toon</button>
      <button id="textured">Textured</button>
    </div>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { OBJLoader } from 'three/addons/loaders/OBJLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101216);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(1.1, 0.3, 2.0);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;

    const ambient = new THREE.AmbientLight(0xffffff, 1.3);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xfff4d8, 2.0);
    key.position.set(1.6, 1.8, 1.4);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x8ab2ff, 0.8);
    fill.position.set(-1.4, 1.0, -1.0);
    scene.add(fill);

    const rim = new THREE.DirectionalLight(0xffffff, 0.5);
    rim.position.set(0.0, 1.5, -2.0);
    scene.add(rim);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(2.2, 64),
      new THREE.MeshBasicMaterial({ color: 0x1a1e25, transparent: true, opacity: 0.88 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.92;
    scene.add(ground);

    function createGradientMap() {
      const colors = [0x342c24, 0x8f7d62, 0xceb995, 0xf4e4c0];
      const size = colors.length;
      const data = new Uint8Array(size * 3);
      colors.forEach((hex, i) => {
        const c = new THREE.Color(hex);
        data[i * 3 + 0] = Math.round(c.r * 255);
        data[i * 3 + 1] = Math.round(c.g * 255);
        data[i * 3 + 2] = Math.round(c.b * 255);
      });
      const map = new THREE.DataTexture(data, size, 1, THREE.RGBFormat);
      map.minFilter = THREE.NearestFilter;
      map.magFilter = THREE.NearestFilter;
      map.needsUpdate = true;
      return map;
    }

    const gradientMap = createGradientMap();
    const texture = new THREE.TextureLoader().load('./texture.png');
    texture.colorSpace = THREE.SRGBColorSpace;

    const state = { mode: 'toon', root: null };

    function applyMaterials() {
      if (!state.root) return;
      state.root.traverse((child) => {
        if (!child.isMesh) return;
        child.material = state.mode === 'toon'
          ? new THREE.MeshToonMaterial({ map: texture, gradientMap })
          : new THREE.MeshStandardMaterial({ map: texture, roughness: 0.96, metalness: 0.0 });
        if (!child.userData.edges) {
          const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(child.geometry, 28),
            new THREE.LineBasicMaterial({ color: 0x17161d })
          );
          child.userData.edges = edges;
          child.add(edges);
        }
        child.userData.edges.visible = state.mode === 'toon';
      });
    }

    const toonButton = document.getElementById('toon');
    const texturedButton = document.getElementById('textured');

    toonButton.addEventListener('click', () => {
      state.mode = 'toon';
      toonButton.classList.add('active');
      texturedButton.classList.remove('active');
      applyMaterials();
    });

    texturedButton.addEventListener('click', () => {
      state.mode = 'textured';
      texturedButton.classList.add('active');
      toonButton.classList.remove('active');
      applyMaterials();
    });

    new OBJLoader().load('./luke-triposr-front.obj', (root) => {
      state.root = root;
      root.rotation.y = Math.PI;
      scene.add(root);
      applyMaterials();

      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      controls.target.copy(center);
      camera.position.set(center.x + size.x * 1.0, center.y + size.y * 0.15, center.z + size.z * 2.0);
      controls.update();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
