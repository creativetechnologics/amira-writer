<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Luke Visual Hull Viewer</title>
  <style>
    html, body { margin: 0; height: 100%; background: #101216; color: #f5f6f8; font-family: Inter, system-ui, sans-serif; }
    #app { position: fixed; inset: 0; }
    .hud {
      position: fixed; top: 16px; left: 16px; z-index: 10;
      background: rgba(16,18,22,.78); backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,.08); border-radius: 14px; padding: 12px 14px;
      max-width: 380px; line-height: 1.35;
    }
    .hud h1 { margin: 0 0 8px; font-size: 15px; }
    .hud p { margin: 6px 0; font-size: 13px; color: #ccd1d8; }
    .hud code { color: #fff; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div class="hud">
    <h1>Luke — Local Visual Hull Preview</h1>
    <p>Drag to orbit, scroll to zoom, right-drag to pan.</p>
    <p>This is a fully local reconstruction from the supplied multi-view reference sheet, with a toon material applied in the viewer.</p>
    <p><code>luke-visual-hull.glb</code></p>
  </div>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from 'three';
    import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    const app = document.getElementById('app');
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    app.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x101216);

    const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.01, 100);
    camera.position.set(1.4, 0.35, 2.2);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.target.set(0, 0.0, 0);

    const ambient = new THREE.AmbientLight(0xffffff, 1.5);
    scene.add(ambient);

    const key = new THREE.DirectionalLight(0xfff4d8, 2.2);
    key.position.set(1.5, 1.2, 1.0);
    scene.add(key);

    const fill = new THREE.DirectionalLight(0x7aa2ff, 0.75);
    fill.position.set(-1.2, 0.6, -0.8);
    scene.add(fill);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(2.2, 64),
      new THREE.MeshBasicMaterial({ color: 0x1a1e25, transparent: true, opacity: 0.9 })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.position.y = -0.91;
    scene.add(ground);

    function createGradientMap() {
      const colors = [0x2a241f, 0x8e7d65, 0xcdb896, 0xf4e4c0];
      const size = colors.length;
      const data = new Uint8Array(size * 3);
      colors.forEach((hex, i) => {
        const c = new THREE.Color(hex);
        data[i * 3 + 0] = Math.round(c.r * 255);
        data[i * 3 + 1] = Math.round(c.g * 255);
        data[i * 3 + 2] = Math.round(c.b * 255);
      });
      const texture = new THREE.DataTexture(data, size, 1, THREE.RGBFormat);
      texture.minFilter = THREE.NearestFilter;
      texture.magFilter = THREE.NearestFilter;
      texture.needsUpdate = true;
      return texture;
    }

    const gradientMap = createGradientMap();
    const loader = new GLTFLoader();
    loader.load('./luke-visual-hull.glb', (gltf) => {
      const root = gltf.scene;
      root.traverse((child) => {
        if (child.isMesh) {
          child.material = new THREE.MeshToonMaterial({
            vertexColors: true,
            gradientMap,
            flatShading: true
          });
          const edges = new THREE.LineSegments(
            new THREE.EdgesGeometry(child.geometry, 28),
            new THREE.LineBasicMaterial({ color: 0x1b1a22 })
          );
          child.add(edges);
        }
      });
      scene.add(root);

      const box = new THREE.Box3().setFromObject(root);
      const center = box.getCenter(new THREE.Vector3());
      const size = box.getSize(new THREE.Vector3());
      controls.target.copy(center);
      camera.position.set(center.x + size.x * 1.2, center.y + size.y * 0.25, center.z + size.z * 2.3);
      controls.update();
    });

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });
  </script>
</body>
</html>
